          const cy = height / 2;
          const r = Math.min(width, height) * 0.35;
          
          const getCoordinates = (index, value) => {
            const angle = (index * 72 - 90) * Math.PI / 180;
            const ratio = value / 5;
            return {
              x: cx + r * ratio * Math.cos(angle),
              y: cy + r * ratio * Math.sin(angle)
            };
          };

          const gridLines = [1, 2, 3, 4, 5].map(level => {
            const points = dims.map((_, i) => {
              const { x, y } = getCoordinates(i, level);
              return `${x},${y}`;
            }).join(' ');
            return <polygon key={level} points={points} fill="none" stroke="#E2E8F0" strokeWidth="1" strokeDasharray={level < 5 ? "4,4" : "0"} />;
          });

          const axisLines = dims.map((_, i) => {
            const outerPoint = getCoordinates(i, 5);
            return <line key={i} x1={cx} y1={cy} x2={outerPoint.x} y2={outerPoint.y} stroke="#CBD5E1" strokeWidth="1" />;
          });

          const labelPoints = dims.map((dim, i) => {
            const angle = (i * 72 - 90) * Math.PI / 180;
            const x = cx + r * 1.25 * Math.cos(angle);
            const y = cy + r * 1.15 * Math.sin(angle);
            
            let textAnchor = "middle";
            if (Math.cos(angle) > 0.1) textAnchor = "start";
            else if (Math.cos(angle) < -0.1) textAnchor = "end";

            return (
              <g key={dim}>
                <text 
                  x={x} 
                  y={y} 
                  textAnchor={textAnchor} 
                  fontSize="11" 
                  fontWeight="bold" 
                  fill="#334155"
                  className="select-none"
                >
                  {dim}
                </text>
              </g>
            );
          });

              const { x, y } = getCoordinates(i, val);
              return `${x},${y}`;
            }).join(' ');

              {gridLines}
              {axisLines}
              
              {[1, 2, 3, 4, 5].map(level => {

                return (
                  <text key={level} x={x + 5} y={y + 4} fontSize="8" fill="#94A3B8" className="select-none font-semibold">

                    stroke="#3B82F6" 
                    strokeWidth="2" 
                    strokeDasharray="3,3"
                  />
                  {dims.map((dim, i) => {

                    return <circle key={i} cx={x} cy={y} r="3" fill="#3B82F6" stroke="#FFF" strokeWidth="1" className="cursor-pointer" />;
                  })}

        };

        // Firebase 初始化宣告區
        const firebaseConfig = getActiveFirebaseConfig();
        const activeAppIdVal = getActiveAppId();
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let firebaseApp, firebaseAuth, firestoreDb;
        const isFirebaseAvailable = !!firebaseConfig;

        if (isFirebaseAvailable) {
          try {
            if (window.firebase && window.firebase.apps.length === 0) {
              firebaseApp = window.firebase.initializeApp(firebaseConfig);
            } else if (window.firebase) {
              firebaseApp = window.firebase.app();
            }
            if (firebaseApp) {
              firebaseAuth = firebaseApp.auth();
              firestoreDb = firebaseApp.firestore();
            }
          } catch (err) {
            console.error("Firebase initialization failed:", err);
          }
        }

        // ==========================================
        // Main Application Component
        // ==========================================
        function App() {
          const [activeTab, setActiveTab] = useState('individual'); // 'individual' | 'department'
          const [showDocGuide, setShowDocGuide] = useState(false); // 控制 Google Sites 指南
          
          const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
          const [isCloudUploading, setIsCloudUploading] = useState(false);
          const [isDbConnected, setIsDbConnected] = useState(!!firestoreDb);
          const [currentAppId, setCurrentAppId] = useState(activeAppIdVal);
          
          const [dialog, setDialog] = useState({
            show: false,
            title: '',
            message: '',
            type: '', // 'reload' | 'delete' | 'overwrite' | 'cloud_upload' | 'db_config'
            payload: null
          });

          const [inputConfig, setInputConfig] = useState('');
          const [inputAppId, setInputAppId] = useState('');

          const fileInputRef = useRef(null);

          const showToast = (message, type = 'success') => {
            setToast({ show: true, message, type });
          };

          useEffect(() => {
            if (toast.show) {
              const timer = setTimeout(() => {
                setToast(prev => ({ ...prev, show: false }));
              }, 4000);
              return () => clearTimeout(timer);
            }
          }, [toast.show]);

          // ------------------------------------------
          // 個人端自評填寫狀態機
          // ------------------------------------------
          const [step, setStep] = useState(1);
          const [personalInfo, setPersonalInfo] = useState({
            name: '',
            department: '秘秘書室',
            title: '',
            jobFunction: '行政管理'
          });
          
          const [selectedTools, setSelectedTools] = useState([]);
          const [selectedToolsForUse, setSelectedToolsForUse] = useState([]);
          const [toolUses, setToolUses] = useState({});
          const [selectedTasks, setSelectedTasks] = useState([]);
          
          const [taskAnswers, setTaskAnswers] = useState({});
          const [teamAnswers, setTeamAnswers] = useState({});
          const [evaluationResults, setEvaluationResults] = useState(null);

          // 三軌獨立數據快照架構
          const [presetMembers, setPresetMembers] = useState(() => 
            JSON.parse(JSON.stringify(INITIAL_DEPARTMENT_MEMBERS))
          );
          const [localMembers, setLocalMembers] = useState([]);
          const [cloudMembers, setCloudMembers] = useState([]);
          const [deletedPresetIds, setDeletedPresetIds] = useState([]);
          const [selectedMemberId, setSelectedMemberId] = useState(null);
          
          const [deptAnalytics, setDeptAnalytics] = useState(null);
          const [firebaseUser, setFirebaseUser] = useState(null);

          // 步驟填寫驗證
          const isStepValid = () => {
            if (step === 1) {
              return !!(personalInfo?.name && personalInfo?.department && personalInfo?.title);
            }
            if (step === 2) {
              return selectedTools.length >= 3;
            }
            if (step === 3) {
              return selectedTasks.length >= 1 && selectedTasks.length <= 3;
            }
            if (step === 4) {
              for (const taskId of selectedTasks) {
                const answers = taskAnswers[taskId] || {};
                for (let i = 1; i <= 5; i++) {
                  if (answers[i] === undefined) return false;
                }
              }
              return true;
            }
            if (step === 5) {
              for (let i = 1; i <= 5; i++) {
                if (teamAnswers[i] === undefined) return false;
              }
              return true;
            }
            return true;
          };

          // 智慧同仁名單數據合併 (Derived State)
          const departmentMembers = (() => {
            let merged = JSON.parse(JSON.stringify(presetMembers));
            merged = merged.filter(m => !deletedPresetIds.includes(m.id));

            const upsert = (member) => {
              if (!member) return;
              const idx = merged.findIndex(m => m && (m.id === member.id || (m.name === member.name && m.title === member.title)));
              if (idx >= 0) {
                merged[idx] = { ...merged[idx], ...member };
              } else {
                merged.push(member);
              }
            };
            localMembers.forEach(upsert);
            cloudMembers.forEach(upsert);
            return merged;
          })();

          // ------------------------------------------
          // 雲端連線即時通訊管線
          // ------------------------------------------
          useEffect(() => {
            if (!isFirebaseAvailable || !window.firebase) {
              setIsDbConnected(false);
              return;
            }

            const initAuth = async () => {
              try {
                if (initialAuthToken) {
                  await firebaseAuth.signInWithCustomToken(initialAuthToken);
                } else {
                  await firebaseAuth.signInAnonymously();
                }
              } catch (err) {
                console.error("Auth fallback:", err);
                try {
                  await firebaseAuth.signInAnonymously();
                } catch (e) {}
              }
            };

            initAuth();
            const unsubscribe = firebaseAuth.onAuthStateChanged((user) => {
              if (user) {
                setFirebaseUser(user);
                setIsDbConnected(true);
              } else {
                setFirebaseUser(null);
                setIsDbConnected(false);
              }
            });

            return () => unsubscribe();
          }, []);

          // 雲端監聽
          useEffect(() => {
            if (!isDbConnected || !firebaseUser || !firestoreDb) return;

            const path = `artifacts/${currentAppId}/public/data/submissions`;
            const unsubscribe = firestoreDb.collection(path).onSnapshot(
              (snapshot) => {
                const cloudList = [];
                snapshot.forEach((doc) => {
                  cloudList.push({ id: doc.id, ...doc.data() });
                });
                setCloudMembers(cloudList);
              },
              (error) => {
                console.error("Cloud snapshot error:", error);
              }
            );

            return () => unsubscribe();
          }, [isDbConnected, firebaseUser, currentAppId]);

          // 重算大數據指標
          useEffect(() => {
            calculateDepartmentAnalytics();
          }, [localMembers, cloudMembers, presetMembers, deletedPresetIds]);

          const calculateDepartmentAnalytics = () => {
            const validMembers = departmentMembers.filter(m => m && m.scores);
            if (validMembers.length === 0) {
              setDeptAnalytics(null);
              return;
            }
            const dims = ["AI技術應用", "業務問題解決", "AI應用與場景整合", "數據識讀與治理", "協作與領導"];
            const averages = {};
            const count = validMembers.length;
            
            dims.forEach(dim => {
              const sum = validMembers.reduce((acc, m) => acc + (m.scores[dim] || 0), 0);
              averages[dim] = count > 0 ? parseFloat((sum / count).toFixed(2)) : 0;
            });
            
            let strongest = dims[0];
            let weakest = dims[0];
            dims.forEach(dim => {
              if (averages[dim] > averages[strongest]) strongest = dim;
              if (averages[dim] < averages[weakest]) weakest = dim;
            });

            const toolCounts = {};
            validMembers.forEach(m => {
              if (Array.isArray(m.tools)) {
                m.tools.forEach(t => {
                  if (t) toolCounts[t] = (toolCounts[t] || 0) + 1;
                });
              }
            });
            const popularTools = Object.entries(toolCounts)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 4)
              .map(([name, count]) => ({ name, count }));

            const taskCounts = {};
            validMembers.forEach(m => {
              if (Array.isArray(m.tasks)) {
                m.tasks.forEach(tid => {
                  const tObj = CORE_TASKS.find(ct => ct.id === tid);
                  const name = tObj ? tObj.name : tid;
                  if (name) taskCounts[name] = (taskCounts[name] || 0) + 1;
                });
              }
            });
            const popularTasks = Object.entries(taskCounts)
              .sort((a, b) => b[1] - a[1])
              .map(([name, count]) => ({ name, count }));

            setDeptAnalytics({
              averages,
              strongest,
              weakest,
              popularTools,
              popularTasks,
              totalCount: count
            });
          };

          // ------------------------------------------
          // 業務處理交互邏輯
          // ------------------------------------------
          const toggleToolSelection = (toolId) => {
            if (selectedTools.includes(toolId)) {
              setSelectedTools(selectedTools.filter(id => id !== toolId));
            } else {
              setSelectedTools([...selectedTools, toolId]);
            }
          };

          const handleToolUseChange = (toolId, text) => {
            setToolUses({
              ...toolUses,
              [toolId]: text
            });
          };

          const toggleTaskSelection = (taskId) => {
            if (selectedTasks.includes(taskId)) {
              setSelectedTasks(selectedTasks.filter(id => id !== taskId));
            } else {
              if (selectedTasks.length >= 3) {
                showToast("日常任務請選擇 1 至 3 項。", "error");
                return;
              }
              setSelectedTasks([...selectedTasks, taskId]);
            }
          };

          const handleTaskAnswer = (taskId, questionNum, val) => {
            setTaskAnswers({
              ...taskAnswers,
              [taskId]: {
                ...(taskAnswers[taskId] || {}),
                [questionNum]: val
              }
            });
          };

          const handleTeamAnswer = (questionNum, val) => {
            setTeamAnswers({
              ...teamAnswers,
              [questionNum]: val
            });
          };

          const processPersonalResult = () => {
            if (!isStepValid()) {
              showToast("請先完成當前步驟的所有必填問題！", "error");
              return;
            }

            const scores = {
              "AI技術應用": [],
              "業務問題解決": [],
              "AI應用與場景整合": [],
              "數據識讀與治理": [],
              "協作與領導": []
            };

            selectedTasks.forEach(taskId => {
              const answers = taskAnswers[taskId] || {};
              const questions = TASK_QUESTIONS[taskId] || [];
              questions.forEach(q => {
                const val = answers[q.num];
                if (val !== undefined) {
                  scores[q.capability].push(val);
                }
              });
            });

            TEAM_QUESTIONS.forEach(q => {
              const val = teamAnswers[q.num];
              if (val !== undefined) {
                scores["協作與領導"].push(val);
              }
            });

            const finalScores = {};
            Object.keys(scores).forEach(dim => {
              const arr = scores[dim];
              if (arr.length > 0) {
                const sum = arr.reduce((acc, v) => acc + v, 0);
                finalScores[dim] = parseFloat((sum / arr.length).toFixed(2));
              } else {
                finalScores[dim] = 1.0;
              }
            });

            const report = {
              personalInfo: { ...personalInfo },
              tools: [...selectedTools],
              toolUses: { ...toolUses },
              tasks: [...selectedTasks],
              scores: finalScores,
              evaluatedAt: new Date().toLocaleDateString()
            };

            setEvaluationResults(report);
            setStep(6);
          };

          const importToDepartment = () => {
            if (!evaluationResults || !evaluationResults.personalInfo) return;
            const name = evaluationResults.personalInfo.name;
            const existsIndex = departmentMembers.findIndex(m => m && m.name === name);

            const performImport = async () => {
              setIsCloudUploading(true);
              
              const targetId = existsIndex >= 0 ? departmentMembers[existsIndex].id : "user_" + Math.random().toString(36).substr(2, 9);
              const memberData = {
                id: targetId,
                name: evaluationResults.personalInfo.name,
                jobFunction: evaluationResults.personalInfo.jobFunction,
                title: evaluationResults.personalInfo.title,
                tools: evaluationResults.tools || [],
                toolUses: evaluationResults.toolUses || {},
                tasks: evaluationResults.tasks || [],
                scores: evaluationResults.scores || {}
              };

              setLocalMembers(prev => {
                const updated = prev.filter(m => m && !(m.name === memberData.name && m.title === memberData.title));
                updated.push(memberData);
                return updated;
              });

              if (isDbConnected && firestoreDb) {
                try {
                  const path = `artifacts/${currentAppId}/public/data/submissions`;
                  await firestoreDb.collection(path).doc(memberData.id).set({
                    name: memberData.name,
                    jobFunction: memberData.jobFunction,
                    title: memberData.title,
                    tools: memberData.tools,
                    toolUses: memberData.toolUses,
                    tasks: memberData.tasks,
                    scores: memberData.scores,
                    evaluatedAt: new Date().toLocaleDateString()
                  });
                  showToast("已成功同步並儲存進雲端資料庫！", "success");
                } catch (err) {
                  console.error("Cloud write failed:", err);
                  showToast("雲端連線失敗，數據已儲存在本地端", "info");
                }
              } else {
                showToast("已將您的自評暫存入主管主控台名單中！", "success");
              }

              setIsCloudUploading(false);
            };

            if (existsIndex >= 0) {
              setDialog({
                show: true,
                title: "覆蓋現有同仁數據",
                message: `部門中已有名為 "${name}" 的同仁自評，是否予以覆蓋更新？`,
                type: 'overwrite',
                payload: performImport
              });
            } else {
              performImport();
            }
          };

          // 匯出個人自評 JSON
          const exportPersonalJSON = () => {
            if (!evaluationResults) return;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(evaluationResults, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `秘書室AI評估_${evaluationResults.personalInfo.name}_${evaluationResults.personalInfo.department}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
            showToast("個人自評 JSON 匯出成功！", "success");
          };

          // 匯出部門備份大數據 JSON
          const exportDepartmentJSON = () => {
            if (departmentMembers.length === 0) {
              showToast("目前沒有部門同仁數據可導出。", "error");
              return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(departmentMembers, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `台師大秘書室AI大數據備份_${new Date().toISOString().slice(0, 10)}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
            showToast("完整秘書室數據備份導出成功！", "success");
          };

          // 動態熱串接資料庫
          const connectDatabaseDynamic = (configStr, customAppId) => {
            if (!window.firebase) {
              showToast("Firebase SDK 尚未加載", "error");
              return;
            }
            try {
              const parsedConfig = JSON.parse(configStr);
              const appName = "dynamic-app-" + Date.now();
              const dynamicApp = window.firebase.initializeApp(parsedConfig, appName);
              const dynamicAuth = dynamicApp.auth();
              const dynamicDb = dynamicApp.firestore();
              
              dynamicAuth.signInAnonymously().then((cred) => {
                setFirebaseUser(cred.user);
                setIsDbConnected(true);
                setCurrentAppId(customAppId);
                
                const path = `artifacts/${customAppId}/public/data/submissions`;
                dynamicDb.collection(path).onSnapshot(
                  (snapshot) => {
                    const cloudList = [];
                    snapshot.forEach((doc) => {
                      cloudList.push({ id: doc.id, ...doc.data() });
                    });
                    setCloudMembers(cloudList);
                    showToast("成功熱啟動並串接自訂雲端資料庫！", "success");
                  },
                  (error) => {
                    console.error("Dynamic subscription error:", error);
                    showToast("讀取雲端失敗，請確認安全規則與連線", "error");
                  }
                );
              }).catch(err => {
                console.error("Dynamic auth error:", err);
                showToast("匿名授權認證失敗", "error");
              });
            } catch (err) {
              console.error("Config error:", err);
              showToast("金鑰 Config JSON 格式錯誤！", "error");
            }
          };

          // 檔案上傳讀取函數
          const handleLocalJSONUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (event) => {
              try {
                const rawData = JSON.parse(event.target.result);
                const importedMembers = [];
                
                if (Array.isArray(rawData)) {
                  rawData.forEach(item => {
                    const processed = processItem(item);
                    if (processed) importedMembers.push(processed);
                  });
                }
                else if (rawData && (Array.isArray(rawData.departmentMembers) || Array.isArray(rawData.members))) {
                  const wrapped = rawData.departmentMembers || rawData.members;
                  wrapped.forEach(item => {
                    const processed = processItem(item);
                    if (processed) importedMembers.push(processed);
                  });
                }
                else if (rawData) {
                  const processed = processItem(rawData);
                  if (processed) importedMembers.push(processed);
                }

                if (importedMembers.length > 0) {
                  setLocalMembers(prev => {
                    const updated = [...prev];
                    importedMembers.forEach(newM => {
                      const idx = updated.findIndex(m => m && m.name === newM.name && m.title === newM.title);
                      if (idx >= 0) {
                        updated[idx] = newM;
                      } else {
                        updated.push(newM);
                      }
                    });
                    return updated;
                  });

                  if (isDbConnected && firestoreDb) {
                    const path = `artifacts/${currentAppId}/public/data/submissions`;
                    for (const member of importedMembers) {
                      try {
                        await firestoreDb.collection(path).doc(member.id).set({
                          name: member.name,
                          jobFunction: member.jobFunction,
                          title: member.title,
                          tools: member.tools,
                          toolUses: member.toolUses,
                          tasks: member.tasks,
                          scores: member.scores,
                          evaluatedAt: new Date().toLocaleDateString()
                        });
                      } catch (cloudErr) {
                        console.error("Batch upload failed for member: " + member.name, cloudErr);
                      }
                    }
                  }
                  showToast("成功匯入/更新同仁數據！", "success");
                } else {
                  showToast("匯入失敗：檔案內未偵測到合適的同仁 AI 資料結構（需包含 name 與 scores 欄位）。", "error");
                }
              } catch (err) {
                console.error("Parse error:", err);
                showToast("解析 JSON 檔案時發生錯誤，請確保該檔案未損壞且為 UTF-8 編碼。", "error");
              }
            };
            reader.readAsText(file);
            e.target.value = ''; 
          };

          // 統一 Dialog 調度確認執行
          const handleConfirm = async () => {
            if (dialog.type === 'reload') {
              setLocalMembers([]);
              setCloudMembers([]);
              setDeletedPresetIds([]);
              setPresetMembers(JSON.parse(JSON.stringify(INITIAL_DEPARTMENT_MEMBERS)));
              setSelectedMemberId(null);

              if (isDbConnected && firestoreDb) {
                try {
                  const path = `artifacts/${currentAppId}/public/data/submissions`;
                  for (const member of departmentMembers) {
                    if (member && !member.id.startsWith("preset_")) {
                      await firestoreDb.collection(path).doc(member.id).delete();
                    }
                  }
                } catch (err) {
                  console.error("Cloud clear error:", err);
                }
              }
              showToast("已成功重置為秘書室預設 Steve 範例數據！", "success");
            } 
            else if (dialog.type === 'delete') {
              const targetId = dialog.payload;
              if (targetId) {
                if (targetId.startsWith("preset_")) {
                  setDeletedPresetIds(prev => [...prev, targetId]);
                }
                setLocalMembers(prev => prev.filter(m => m.id !== targetId));
                setCloudMembers(prev => prev.filter(m => m.id !== targetId));
                
                if (selectedMemberId === targetId) {
                  setSelectedMemberId(null);
                }

                if (isDbConnected && firestoreDb && !targetId.startsWith("preset_")) {
                  try {
                    const path = `artifacts/${currentAppId}/public/data/submissions`;
                    await firestoreDb.collection(path).doc(targetId).delete();
                  } catch (err) {
                    console.error("Cloud delete error:", err);
                  }
                }
                showToast("已成功移除該同仁自評數據。", "success");
              }
            } 
            else if (dialog.type === 'overwrite') {
              if (typeof dialog.payload === 'function') {
                dialog.payload();
              }
            }
            else if (dialog.type === 'db_config') {
              const savedOk = safeSetItem('tsnu_sec_fb_config', inputConfig) && safeSetItem('tsnu_sec_app_id', inputAppId);
              if (savedOk) {
                showToast("資料庫設定成功，正在嘗試載入連線...", "success");
                setTimeout(() => {
                  window.location.reload();
                }, 1200);
              } else {
                showToast("瀏覽器限制本地儲存，已直接將雲端連線載入記憶體！", "warning");
                connectDatabaseDynamic(inputConfig, inputAppId);
              }
            }
            setDialog({ show: false, title: '', message: '', type: '', payload: null });
          };

          const reloadDefaultPreset = () => {
            setDialog({
              show: true,
              title: "載入預設秘書數據",
              message: "確認是否要重新載入秘書室 5 名專職同仁（Steve 王、Steve 林、Steve 張等）的預設評估數據？若已同步至雲端，這將一併初始化遠端名單。",
              type: 'reload',
              payload: null
            });
          };

          const removeMember = (index) => {
            const member = departmentMembers[index];
            if (!member) return;
            
            setDialog({
              show: true,
              title: "刪除同仁自評",
              message: `確定要刪除秘書室同仁 [${member.name} - ${member.title}] 的自評數據嗎？這將一併在雲端與本機列表中徹底抹除。`,
              type: 'delete',
              payload: member.id
            });
          };

          const handlePrint = () => {
            window.print();
          };

          const selectedMember = departmentMembers.find(m => m && m.id === selectedMemberId);

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans print:bg-white print:p-0">
              
              {/* Header 橫幅 */}
              <header className="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm print:hidden">
                <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                  <div className="flex items-center gap-3">
                    <div className="bg-emerald-700 text-white p-2.5 rounded-xl shadow-md">
                      <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                      </svg>
                    </div>
                    <div>
                      <div className="flex items-center gap-2 flex-wrap">
                        <h1 className="text-lg sm:text-xl font-extrabold text-slate-900 tracking-tight">{APP_TITLE}</h1>

                                  We 選定本單位耗時高、具備高度優化效益 of 兩大日常行政工作：
                                </p>
                                <ul className="list-decimal pl-5 mt-1 text-slate-600 font-extrabold space-y-1">
                                  <li>「校級會議（如行政會議、主管會報）語音逐字稿提煉與紀錄」 (優化點：Notta/Whisper 精準轉錄與會議重點摘要)</li>
                                  <li>「文書稽催、用印管理合規性審查與行政契約初審」 (優化點：利用 Claude 進行條文合規與風險快速比對)</li>
                                </ul>
                              </div>

                              <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-xs animate-scale-up">
                                <div className="font-bold text-slate-900 mb-1">3.2 具體規劃與設計導入 AI 的 4 大步驟</div>
                                <div className="grid grid-cols-4 gap-1.5 mt-2 text-center text-[10px] font-extrabold text-white">
                                  <div className="p-2 bg-blue-800 rounded">步驟一<br />公用 Prompt 範本建立<br />(第 1-3 天)</div>
                                  <div className="p-2 bg-blue-900 rounded">步驟二<br />語音/法務工具導入訓練<br />(第 4-8 天)</div>
                                  <div className="p-2 bg-indigo-900 rounded">步驟三<br />機密個資篩檢稽核機制<br />(第 9-12 天)</div>
                                  <div className="p-2 bg-indigo-950 rounded">步驟四<br />日常公務工作流全面整合<br />(第 13-21 天)</div>
                                </div>
                              </div>

                              <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-xs animate-scale-up">
                                <div className="font-bold text-slate-900 mb-1">3.3 預期達到之 AI 化成效與綜合指標</div>
                                <ul className="list-disc pl-5 text-slate-600 space-y-1 font-bold">
                                  <li><span className="text-blue-800">時間成效</span>：會議紀錄轉錄交付時間由 3 天縮短為 4 小時；契約法務風險預審時間縮短 70%。</li>
                                  <li><span className="text-blue-800">安全合規</span>：導入全套「台師大行政個資過濾 Prompt」，確保用印與文書傳輸達成零資安風險、零法務合規風險。</li>
                                </ul>
                              </div>
                            </div>
                          </div>

                        </div>
                      </div>

                    </div>
                  </div>
                )}

              </main>

              {/* 隱藏式檔案上傳節點 */}
              <input 
                type="file" 
                ref={fileInputRef} 
                onChange={handleLocalJSONUpload} 
                accept=".json" 
                className="hidden" 
              />

              {/* 聲明對話框 */}
              {dialog.show && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-xs p-4 animate-fade-in print:hidden">
                  <div className="bg-white p-6 rounded-2xl max-w-sm w-full border border-slate-200 shadow-2xl animate-scale-up space-y-4">
                    
                    {dialog.type === 'db_config' ? (
                      <div className="space-y-4">
                        <div className="flex items-center gap-3 select-none">
                          <div className="bg-emerald-100 text-emerald-800 p-2 rounded-xl shrink-0">
                            <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                            </svg>
                          </div>
                          <h3 className="text-base font-extrabold text-slate-900">{dialog.title}</h3>
                        </div>
                        <p className="text-xs text-slate-500 font-bold leading-relaxed select-none">{dialog.message}</p>
                        
                        <div className="space-y-3">
                          <div>
                            <label className="block text-[11px] font-extrabold text-slate-600 mb-1 select-none">1. Paste Firebase Config JSON *</label>
                            <textarea
                              rows={5}
                              value={inputConfig}
                              onChange={e => setInputConfig(e.target.value)}
                              placeholder='例如:
{
  "apiKey": "AIzaSy...",
  "authDomain": "tsnu-sec.firebaseapp.com",
  "projectId": "tsnu-sec",
  "storageBucket": "tsnu-sec.appspot.com",
  "appId": "1:..."
}'
                              className="w-full p-2.5 rounded-lg border border-slate-200 text-[10px] font-mono focus:outline-none focus:ring-1 focus:ring-emerald-600 bg-slate-50 font-bold"
                            />
                          </div>
                          <div>
                            <label className="block text-[11px] font-extrabold text-slate-600 mb-1 select-none">2. 單位識別碼 (App ID)</label>
                            <input
                              type="text"
                              value={inputAppId}
                              onChange={e => setInputAppId(e.target.value)}
                              placeholder="例如: tsnu-sec-app"
                              className="w-full px-3 py-1.5 rounded-lg border border-slate-200 text-xs font-bold bg-slate-50"
                            />
                          </div>
                        </div>

                        <div className="flex justify-end gap-2 pt-2">
                          <button 
                            type="button"
                            onClick={() => setDialog({ show: false, title: '', message: '', type: '', payload: null })}
                            className="px-4 py-2 text-xs font-bold text-slate-500 hover:text-slate-800 bg-slate-100 hover:bg-slate-200 rounded-xl transition-all cursor-pointer hover:scale-105 active:scale-95"
                          >
                            取消
                          </button>
                          <button 
                            type="button"
                            onClick={handleConfirm}
                            className="px-4 py-2 text-xs font-bold text-white bg-emerald-700 hover:bg-emerald-800 rounded-xl shadow-md transition-all cursor-pointer hover:scale-105 active:scale-95"
                          >
                            儲存金鑰並連線
                          </button>
                        </div>
                      </div>
                    ) : (
                      <>
                        <div className="flex items-center gap-3 select-none">
                          <div className="bg-amber-100 text-amber-800 p-2 rounded-xl shrink-0">
                            <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                          </div>
                          <h3 className="text-base font-extrabold text-slate-900">{dialog.title}</h3>
                        </div>
                        <p className="text-xs text-slate-600 font-bold leading-relaxed select-none">{dialog.message}</p>
                        <div className="flex justify-end gap-2.5 pt-2">
                          <button 
                            type="button"
                            onClick={() => setDialog({ show: false, title: '', message: '', type: '', payload: null })}
                            className="px-4 py-2 text-xs font-bold text-slate-500 hover:text-slate-800 bg-slate-100 hover:bg-slate-200 rounded-xl transition-all cursor-pointer hover:scale-105 active:scale-95"
                          >
                            取消
                          </button>
                          <button 
                            type="button"
                            onClick={handleConfirm}
                            className="px-4 py-2 text-xs font-bold text-white bg-slate-800 hover:bg-slate-950 rounded-xl shadow-md transition-all animate-pulse cursor-pointer hover:scale-105 active:scale-95"
                          >
                            確認執行
                          </button>
                        </div>
                      </>
                    )}
                    
                  </div>
                </div>
              )}

              <footer className="text-center py-8 text-xs text-slate-400 font-bold border-t border-slate-200 mt-12 print:mt-8 print:border-slate-100 select-none">
                <p>© 2026 國立臺灣師範大學秘書室 AI 應用能力評估系統. 基於 AIF 工業人才認定與三周後優化報告指引設計.</p>
              </footer>

            </div>
          );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
